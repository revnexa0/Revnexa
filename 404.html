<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Revnexa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>.e404{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;background:var(--gradient-hero);position:relative;overflow:hidden}.e404 .shape{position:absolute;border-radius:50%;background:rgba(37,99,235,0.1);filter:blur(60px)}.e404 h1{font-size:8rem;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0;line-height:1}.e404 h2{color:var(--white);margin-bottom:16px}.e404 p{color:var(--dark-400);margin-bottom:32px;font-size:1.1rem}</style>
</head>
<body>
<div class="e404">
  <div class="shape" style="width:400px;height:400px;top:-100px;right:-100px"></div>
  <div class="shape" style="width:300px;height:300px;bottom:-50px;left:-50px"></div>
  <div style="position:relative;z-index:1">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="index.html" class="btn btn-primary btn-lg">Back to Home</a>
  </div>
</div>
</body>
</html>
